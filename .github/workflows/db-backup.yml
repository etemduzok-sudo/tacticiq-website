name: DB Backup - Weekly

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  backup-database:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Export Database Tables
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p backup
          DATE=$(date +%Y-%m-%d)

          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const fs = require('fs');
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);

          const tables = [
            'users', 'user_stats', 'favorite_teams',
            'predictions', 'prediction_items', 'prediction_scores',
            'squad_predictions', 'formation_statistics',
            'match_results', 'match_end_snapshots',
            'leaderboard_snapshots', 'player_community_ratings',
            'leagues', 'teams', 'matches',
            'players', 'static_teams', 'team_squads',
            'player_power_scores'
          ];

          async function fetchAll(table) {
            const rows = [];
            const PAGE = 5000;
            let from = 0;
            while (true) {
              const { data, error } = await supabase
                .from(table)
                .select('*')
                .range(from, from + PAGE - 1);
              if (error) throw new Error(table + ': ' + error.message);
              if (!data || data.length === 0) break;
              rows.push(...data);
              if (data.length < PAGE) break;
              from += PAGE;
            }
            return rows;
          }

          (async () => {
            const summary = {};
            for (const table of tables) {
              try {
                const data = await fetchAll(table);
                fs.writeFileSync('backup/' + table + '_' + '${DATE}' + '.json', JSON.stringify(data));
                summary[table] = { rows: data.length };
                console.log('OK ' + table + ': ' + data.length + ' rows');
              } catch (e) {
                console.error('FAIL ' + table + ':', e.message);
                summary[table] = { error: e.message };
              }
            }
            fs.writeFileSync('backup/summary_' + '${DATE}' + '.json', JSON.stringify(summary, null, 2));
            console.log('Backup complete');
          })();
          "

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: backend/backup/
          retention-days: 90
